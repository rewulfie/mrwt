<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mrwt — a private correspondence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1C1612;
    --ink-mid: #4A3728;
    --ink-light: #7A6355;
    --body-text: #1A1410;
    --placeholder: #555045;
    --parchment: #E8D9B5;
    --parchment-dark: #D9C89A;
    --parchment-deep: #C0A87A;
    --box-bg: #F0E4C4;
    --honey-pale: #DFC99A;
    --honey-gold: #C4A44A;
  }

  body {
    background: var(--parchment);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Libre Baskerville', Georgia, serif;
    color: var(--body-text);
    margin: 0;
  }

  .app-frame {
    width: 100%;
    min-height: 100vh;
    background: var(--parchment);
    display: flex;
    flex-direction: column;
  }

  .app-header {
    text-align: center;
    padding: 32px 24px 18px;
    border-bottom: 1px solid var(--parchment-dark);
  }

  .app-title {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--ink);
  }

  .app-subtitle {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--ink-light);
    margin-top: 7px;
    text-transform: lowercase;
  }

  .nav-tabs { display: flex; border-bottom: 1px solid var(--parchment-dark); }

  .nav-tab {
    flex: 1;
    padding: 13px 8px;
    background: transparent;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .nav-tab.active { color: var(--ink); border-bottom: 2px solid #8B1A1A; }

  .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
  .screen.active { display: flex; }

  .welcome-screen {
    padding: 40px 28px 32px;
    align-items: center;
    justify-content: center;
    min-height: 500px;
  }

  .letter-icon { width: 80px; height: 64px; margin: 0 auto 28px; }
  .letter-icon svg { width: 100%; height: 100%; }

  .welcome-title {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    color: var(--ink);
    text-transform: lowercase;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .welcome-sub {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-light);
    text-align: center;
    line-height: 1.9;
    margin-bottom: 36px;
    text-transform: lowercase;
  }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    text-transform: lowercase;
    color: var(--ink);
    margin-bottom: 10px;
    display: block;
    letter-spacing: -0.3px;
  }

  .input-wrap {
    width: 100%;
    height: 38px;
    overflow: hidden;
    margin-bottom: 24px;
    background: var(--box-bg);
    border: 1px solid var(--parchment-deep);
    border-radius: 3px;
    display: flex;
    align-items: center;
  }

  .input-wrap:focus-within { border-color: #8B1A1A; }

  .ink-input {
    width: 180%;
    transform: scale(0.55);
    transform-origin: left center;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--placeholder);
    padding: 0 10px;
    flex-shrink: 0;
  }

  .ink-input::placeholder { color: var(--placeholder); }

  .seal-circle-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }

  .seal-card {
    background: var(--box-bg);
    border: 1px solid var(--parchment-deep);
    border-radius: 12px;
    padding: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .seal-card:hover { opacity: 0.9; }
  .seal-card.loading { opacity: 0.5; pointer-events: none; }

  .btn-footnote {
    background: transparent;
    border: none;
    color: var(--ink-light);
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    margin-top: 18px;
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--parchment-deep);
    transition: color 0.2s;
    text-transform: lowercase;
  }

  .btn-footnote:hover { color: var(--ink-mid); }

  .write-screen { padding: 24px 0 120px; }

  .letter-paper {
    margin: 0 20px;
    background: var(--box-bg);
    border: 1px solid var(--parchment-dark);
    border-radius: 2px;
    padding: 32px 28px;
  }

  .letter-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-light);
    text-align: right;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .letter-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--parchment-deep);
    margin-bottom: 6px;
    display: block;
  }

  .letter-line-wrap {
    width: 100%;
    height: 36px;
    overflow: hidden;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.35);
    border: 1px solid var(--parchment-dark);
    border-radius: 3px;
    display: flex;
    align-items: center;
  }

  .letter-line-wrap:focus-within { border-color: #8B1A1A; }

  .letter-line {
    width: 180%;
    transform: scale(0.55);
    transform-origin: left center;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--placeholder);
    padding: 0 10px;
  }

  .letter-line::placeholder { color: var(--placeholder); }

  .letter-body-wrap {
    width: 100%;
    min-height: 220px;
    overflow: hidden;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.35);
    border: 1px solid var(--parchment-dark);
    border-radius: 3px;
    padding: 10px 0;
  }

  .letter-body-wrap:focus-within { border-color: #8B1A1A; }

  .letter-body {
    width: 180%;
    transform: scale(0.55);
    transform-origin: left top;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 10px;
    font-weight: 400;
    line-height: 2;
    color: var(--placeholder);
    padding: 0 10px;
    min-height: 380px;
  }

  .letter-body::placeholder { color: var(--placeholder); }

  .send-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 20px 20px;
    background: var(--parchment);
    border-top: 1px solid var(--parchment-dark);
    z-index: 20;
    display: flex;
    justify-content: center;
  }

  .send-bar-card {
    background: var(--box-bg);
    border: 1px solid var(--parchment-deep);
    border-radius: 12px;
    padding: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .send-bar-card:hover { opacity: 0.9; }
  .send-bar-card.loading { opacity: 0.5; pointer-events: none; }

  .archive-screen { padding: 24px 20px 80px; }
  .archive-header { text-align: center; margin-bottom: 24px; }

  .archive-title {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-transform: lowercase;
    letter-spacing: -0.5px;
  }

  .letter-card {
    background: var(--box-bg);
    border: 1px solid var(--parchment-dark);
    border-radius: 2px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .letter-card:hover { background: rgba(255,255,255,0.5); border-color: var(--parchment-deep); }

  .letter-card-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .letter-card-from {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .letter-card-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-light);
    text-transform: uppercase;
  }

  .letter-card-preview {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--body-text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .unread-dot {
    width: 6px;
    height: 6px;
    background-color: #8B1A1A;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(16,10,6,0.65);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal-sheet {
    width: 100%;
    max-height: 88vh;
    background: var(--parchment);
    border-radius: 10px 10px 0 0;
    overflow-y: auto;
    padding: 28px 28px 52px;
    position: relative;
  }

  .modal-handle {
    width: 36px;
    height: 3px;
    background: var(--parchment-deep);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .modal-mini-seal {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background-color: #8B1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #C4A44A;
    margin: 0 auto 16px;
    letter-spacing: 1px;
    text-transform: lowercase;
  }

  .modal-from {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    text-align: center;
    color: var(--ink);
    text-transform: lowercase;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .modal-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-light);
    text-align: center;
    margin-bottom: 24px;
  }

  .modal-divider {
    border: none;
    border-top: 1px solid var(--parchment-dark);
    margin: 0 0 24px;
  }

  .modal-body {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 2;
    color: var(--body-text);
    white-space: pre-wrap;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: transparent;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--ink-light);
    cursor: pointer;
  }

  .pair-badge {
    background: var(--honey-pale);
    border-bottom: 1px solid var(--parchment-dark);
    padding: 7px 20px;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: lowercase;
    color: #8B1A1A;
    text-align: center;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pair-badge-sign-out {
    background: transparent;
    border: none;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: lowercase;
  }

  .pair-badge-sign-out:hover { color: var(--ink); }

  .toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--ink);
    color: var(--parchment);
    padding: 11px 22px;
    border-radius: 3px;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 12px;
    opacity: 0;
    transition: all 0.35s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-state {
    text-align: center;
    padding: 56px 24px;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 13px;
    color: var(--ink-light);
    line-height: 2;
    text-transform: lowercase;
  }
</style>
</head>
<body>
<div class="app-frame">

  <div class="app-header">
    <div class="app-title">Mrwt</div>
    <div class="app-subtitle">مـرـوـت — ancient egyptian for love</div>
  </div>

  <div class="pair-badge" id="pair-badge" style="display:none">
    <span>paired with <span id="partner-display"></span></span>
    <button class="pair-badge-sign-out" onclick="signOut()">sign out</button>
  </div>

  <div class="nav-tabs" id="main-nav" style="display:none">
    <button class="nav-tab active" onclick="showScreen('write')">Write</button>
    <button class="nav-tab" onclick="showScreen('archive')">Archive</button>
  </div>

  <div class="screen active welcome-screen" id="screen-welcome">
    <div style="width:100%; max-width: 420px;">

      <div class="letter-icon">
        <svg viewBox="0 0 80 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="10" width="76" height="52" rx="3" fill="#F0E4C4" stroke="#C0A87A" stroke-width="1.5"/>
          <path d="M2 10 L40 38 L78 10" stroke="#C0A87A" stroke-width="1.5" fill="none"/>
          <path d="M2 10 L2 62" stroke="#C0A87A" stroke-width="0.8" opacity="0.4"/>
          <path d="M78 10 L78 62" stroke="#C0A87A" stroke-width="0.8" opacity="0.4"/>
          <rect x="16" y="2" width="48" height="36" rx="2" fill="#F7EFD8" stroke="#C0A87A" stroke-width="1"/>
          <line x1="22" y1="11" x2="58" y2="11" stroke="#C0A87A" stroke-width="1" opacity="0.6"/>
          <line x1="22" y1="17" x2="58" y2="17" stroke="#C0A87A" stroke-width="1" opacity="0.6"/>
          <line x1="22" y1="23" x2="48" y2="23" stroke="#C0A87A" stroke-width="1" opacity="0.6"/>
          <circle cx="40" cy="31" r="4" fill="#8B1A1A"/>
        </svg>
      </div>

      <div class="welcome-title">drop your letter</div>
      <div class="welcome-sub">
        share a secret code with your beloved.<br>
        your letters belong only to the two of you.
      </div>

      <label class="field-label" for="input-name">your name</label>
      <div class="input-wrap"><input class="ink-input" id="input-name" type="text" placeholder="how shall you sign your letters?" /></div>

      <label class="field-label" for="input-partner">your beloved's name</label>
      <div class="input-wrap"><input class="ink-input" id="input-partner" type="text" placeholder="to whom do you write?" /></div>

      <label class="field-label" for="input-code">secret pairing code</label>
      <div class="input-wrap"><input class="ink-input" id="input-code" type="text" placeholder="a word only the two of you know..." /></div>

      <div class="seal-circle-wrap">
        <div class="seal-card" id="seal-card-welcome" onclick="pairUp()">
          <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="40" r="36" fill="#8B1A1A"/>
            <circle cx="40" cy="40" r="28" fill="none" stroke="#C4A44A" stroke-width="0.8" opacity="0.5"/>
            <text x="40" y="44" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#C4A44A" letter-spacing="3">seal</text>
          </svg>
        </div>
      </div>

      <button class="btn-footnote" onclick="loadDemo()">see a demonstration first</button>
    </div>
  </div>

  <div class="screen write-screen" id="screen-write">
    <div class="letter-paper">
      <div class="letter-date" id="write-date"></div>
      <span class="letter-section-label">greeting</span>
      <div class="letter-line-wrap"><input class="letter-line" id="letter-greeting" type="text" placeholder="My dearest..." /></div>
      <span class="letter-section-label">your letter</span>
      <div class="letter-body-wrap"><textarea class="letter-body" id="letter-body" placeholder="Write here..."></textarea></div>
      <span class="letter-section-label">closing</span>
      <div class="letter-line-wrap"><input class="letter-line" id="letter-closing" type="text" placeholder="Yours, always..." /></div>
      <span class="letter-section-label">signature</span>
      <div class="letter-line-wrap"><input class="letter-line" id="letter-signature" type="text" placeholder="Your name..." /></div>
    </div>

    <div class="send-bar">
      <div class="send-bar-card" id="send-bar-card" onclick="sendLetter()">
        <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="32" fill="#8B1A1A"/>
          <circle cx="36" cy="36" r="25" fill="none" stroke="#C4A44A" stroke-width="0.8" opacity="0.5"/>
          <text x="36" y="40" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10" fill="#C4A44A" letter-spacing="3">seal</text>
        </svg>
      </div>
    </div>
  </div>

  <div class="screen archive-screen" id="screen-archive">
    <div class="archive-header">
      <div class="archive-title">letter box</div>
    </div>
    <div id="archive-list"></div>
  </div>

</div>

<div class="modal-overlay" id="letter-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-mini-seal">seal</div>
    <div class="modal-from" id="modal-from"></div>
    <div class="modal-date" id="modal-date"></div>
    <hr class="modal-divider">
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================
  // SUPABASE CONNECTION
  // ============================================
  const SUPABASE_URL = 'https://rpdbnmwyfjzilbsrhgsd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_npstJNu6Vn-F65KlcPDQjw_TBmlA0zl';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ============================================
  // STATE
  // ============================================
  let userName = '', partnerName = '', pairCode = '', pairId = null, letters = [];
  let isDemo = false;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ============================================
  // HELPERS
  // ============================================
  function formatDate(d) {
    const dt = new Date(d);
    return `${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    const tabs = document.querySelectorAll('.nav-tab');
    if (name === 'write') tabs[0].classList.add('active');
    if (name === 'archive') { tabs[1].classList.add('active'); loadLetters(); }
  }

  // ============================================
  // SESSION (saved in browser so you stay paired)
  // ============================================
  function saveSession() {
    if (isDemo) return;
    localStorage.setItem('mrwt_session', JSON.stringify({ userName, partnerName, pairCode, pairId }));
  }

  function loadSession() {
    const saved = localStorage.getItem('mrwt_session');
    if (!saved) return false;
    try {
      const s = JSON.parse(saved);
      userName = s.userName; partnerName = s.partnerName; pairCode = s.pairCode; pairId = s.pairId;
      return true;
    } catch { return false; }
  }

  function signOut() {
    localStorage.removeItem('mrwt_session');
    userName = ''; partnerName = ''; pairCode = ''; pairId = null; letters = []; isDemo = false;
    document.getElementById('screen-welcome').classList.add('active');
    document.getElementById('screen-write').classList.remove('active');
    document.getElementById('screen-archive').classList.remove('active');
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('pair-badge').style.display = 'none';
    document.getElementById('input-name').value = '';
    document.getElementById('input-partner').value = '';
    document.getElementById('input-code').value = '';
  }

  // ============================================
  // PAIRING (Supabase)
  // ============================================
  async function pairUp() {
    const n = document.getElementById('input-name').value.trim();
    const p = document.getElementById('input-partner').value.trim();
    const c = document.getElementById('input-code').value.trim().toLowerCase();
    if (!n || !p || !c) { showToast('please fill in all three fields.'); return; }

    const sealCard = document.getElementById('seal-card-welcome');
    sealCard.classList.add('loading');

    try {
      // Check if a pair with this code already exists
      const { data: existing, error: lookupErr } = await supabase
        .from('pairs')
        .select('*')
        .eq('pair_code', c)
        .maybeSingle();

      if (lookupErr) throw lookupErr;

      if (existing) {
        // Pair exists — join it
        userName = n; partnerName = p; pairCode = c; pairId = existing.id;
        // Update the second person's name if missing
        if (!existing.user_b_name && existing.user_a_name !== n) {
          await db.from('pairs').update({ user_b_name: n }).eq('id', existing.id);
        }
      } else {
        // Create new pair
        const { data: created, error: createErr } = await supabase
          .from('pairs')
          .insert({ pair_code: c, user_a_name: n })
          .select()
          .single();
        if (createErr) throw createErr;
        userName = n; partnerName = p; pairCode = c; pairId = created.id;
      }

      saveSession();
      activateApp();
    } catch (err) {
      console.error(err);
      showToast('something went wrong. try again.');
    } finally {
      sealCard.classList.remove('loading');
    }
  }

  // ============================================
  // DEMO MODE (works without Supabase)
  // ============================================
  function loadDemo() {
    isDemo = true;
    userName = 'Elara'; partnerName = 'Théodore'; pairCode = 'demo';
    letters = [
      { from_name: 'Théodore', created_at: '2024-11-03T10:22:00', greeting: 'My dearest Elara,', body: 'The city is cold today, but I find myself warm whenever I think of the way you laugh — that sudden, unguarded thing you do when something catches you by surprise.\n\nI have been carrying your last letter in my coat pocket. The paper has softened with the folding and unfolding.', closing: 'With all of my heart,', signature: 'Théodore' },
      { from_name: 'Elara', created_at: '2024-11-07T21:45:00', greeting: 'My love,', body: 'I read your words three times before I put them down. I counted the days until I could write back — fourteen, which felt like a small eternity.\n\nThe stars here are extraordinary tonight. I went outside just to look at them, wondering which ones you can see too. There must be some overlap.', closing: 'Yours, always,', signature: 'Elara' },
      { from_name: 'Théodore', created_at: '2024-12-01T08:10:00', greeting: 'Elara,', body: 'The first snow. I stood at the window this morning with coffee going cold in my hands, thinking: she would love this. And then I felt the distance more acutely than usual — not as pain, exactly, but as a kind of beautiful ache.\n\nI am saving this feeling to tell you properly, someday, in person.', closing: 'Always,', signature: 'Théodore' }
    ];
    activateApp();
  }

  function activateApp() {
    document.getElementById('screen-welcome').classList.remove('active');
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('pair-badge').style.display = 'flex';
    document.getElementById('partner-display').textContent = partnerName;
    document.getElementById('write-date').textContent = formatDate(new Date()).toUpperCase();
    showScreen('write');
  }

  // ============================================
  // SEND LETTER (Supabase)
  // ============================================
  async function sendLetter() {
    const greeting = document.getElementById('letter-greeting').value.trim();
    const body = document.getElementById('letter-body').value.trim();
    const closing = document.getElementById('letter-closing').value.trim();
    const signature = document.getElementById('letter-signature').value.trim();
    if (!body) { showToast('your letter is empty.'); return; }

    const letter = {
      pair_id: pairId,
      from_name: userName,
      greeting: greeting || `My dearest ${partnerName},`,
      body,
      closing: closing || 'Yours, always,',
      signature: signature || userName
    };

    if (isDemo) {
      letters.unshift({ ...letter, created_at: new Date().toISOString() });
      clearLetterForm();
      showToast('your letter has been sealed and sent.');
      setTimeout(() => showScreen('archive'), 1200);
      return;
    }

    const sendCard = document.getElementById('send-bar-card');
    sendCard.classList.add('loading');

    try {
      const { error } = await db.from('letters').insert(letter);
      if (error) throw error;
      clearLetterForm();
      showToast('your letter has been sealed and sent.');
      setTimeout(() => showScreen('archive'), 1200);
    } catch (err) {
      console.error(err);
      showToast('failed to send. try again.');
    } finally {
      sendCard.classList.remove('loading');
    }
  }

  function clearLetterForm() {
    ['letter-greeting','letter-body','letter-closing','letter-signature']
      .forEach(id => document.getElementById(id).value = '');
  }

  // ============================================
  // LOAD LETTERS (Supabase)
  // ============================================
  async function loadLetters() {
    if (isDemo) { renderArchive(); return; }
    if (!pairId) return;

    const el = document.getElementById('archive-list');
    el.innerHTML = `<div class="empty-state">loading...</div>`;

    try {
      const { data, error } = await supabase
        .from('letters')
        .select('*')
        .eq('pair_id', pairId)
        .order('created_at', { ascending: false });
      if (error) throw error;
      letters = data || [];
      renderArchive();
    } catch (err) {
      console.error(err);
      el.innerHTML = `<div class="empty-state">could not load letters.<br>check your connection.</div>`;
    }
  }

  function renderArchive() {
    const el = document.getElementById('archive-list');
    if (!letters.length) {
      el.innerHTML = `<div class="empty-state">no letters yet.<br>be the first to write.</div>`;
      return;
    }
    el.innerHTML = letters.map((l, i) => `
      <div class="letter-card" onclick="openLetter(${i})">
        <div class="letter-card-meta">
          <div class="letter-card-from">${escapeHtml(l.from_name)}${i === 0 && l.from_name !== userName ? '<span class="unread-dot"></span>' : ''}</div>
          <div class="letter-card-date">${formatDate(l.created_at)}</div>
        </div>
        <div class="letter-card-preview">${escapeHtml(l.greeting || '')} ${escapeHtml((l.body || '').replace(/\n/g,' '))}</div>
      </div>`).join('');
  }

  function openLetter(i) {
    const l = letters[i];
    document.getElementById('modal-from').textContent = `a letter from ${l.from_name}`;
    document.getElementById('modal-date').textContent = formatDate(l.created_at).toUpperCase();
    document.getElementById('modal-body').textContent =
      `${l.greeting || ''}\n\n${l.body || ''}\n\n${l.closing || ''}\n${l.signature || ''}`;
    document.getElementById('letter-modal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('letter-modal'))
      document.getElementById('letter-modal').classList.remove('open');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // ============================================
  // STARTUP — auto-login if previously paired
  // ============================================
  if (loadSession()) {
    activateApp();
  }
</script>
</body>
</html>
